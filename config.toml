# ── mplus-tracker configuration ───────────────────────────────────────────────
#
# Edit this file, then run:  docker-compose up --build
#
# All values below are also overridable via environment variables (see README).

[raiderio]
base_url      = "https://raider.io/api/v1"
user_agent    = "mplus-tracker/0.1"
max_retries   = 5
base_backoff_ms = 1000   # 1 second
max_backoff_ms  = 120000 # 2 minutes

[storage]
database_path = "/data/mplus.sqlite"

[server]
host = "0.0.0.0"
port = 8080

[concurrency]
max_concurrent_raiderio = 3


# ── Guilds to track ────────────────────────────────────────────────────────────
# Use POST /update/guild?region=us&realm=area-52&name=My%20Guild to pull members.

[[guilds]]
region = "us"
realm  = "stormrage"
name   = "seems good"


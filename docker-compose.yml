services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mplus-tracker
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # SQLite database persisted on the host
      - mplus-db:/data
      # Mount your local config.toml into the container
      - ./config.toml:/config/config.toml:ro
    environment:
      CONFIG_PATH: /config/config.toml
      DATABASE_PATH: /data/mplus.sqlite
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      # Tune concurrency (max parallel Raider.IO requests)
      MAX_CONCURRENT_RAIDERIO: "3"
      # Log level: trace | debug | info | warn | error
      RUST_LOG: "info,mplus_tracker=debug"
      # Authorization Header - openssl rand -hex 32
      API_TOKEN: "${API_TOKEN}"
    env_file:
      - .env
  
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mplus-tracker-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TUNNEL_TOKEN}"
    env_file:
      - .env
    depends_on:
      - app
    networks:
      - default

volumes:
  mplus-db:
    driver: local

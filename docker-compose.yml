version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mplus-tracker
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # SQLite database persisted on the host
      - mplus-db:/data
      # Mount your local config.toml into the container
      - ./config.toml:/config/config.toml:ro
    environment:
      CONFIG_PATH: /config/config.toml
      DATABASE_PATH: /data/mplus.sqlite
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      # Tune concurrency (max parallel Raider.IO requests)
      MAX_CONCURRENT_RAIDERIO: "3"
      # Log level: trace | debug | info | warn | error
      RUST_LOG: "info,mplus_tracker=debug"

volumes:
  mplus-db:
    driver: local
